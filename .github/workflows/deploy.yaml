name: Pipeline CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: arn:aws:iam::547519647118:role/GitHubActionsRepoApp
          aws-region: sa-east-1

      - name: Amazon ECR "Login" Action for GitHub Actions
        uses: aws-actions/amazon-ecr-login@v2.0.1
      
      - name: Build Image
        run: |
          docker build -t website:v1.0 .
          dokcer tag website:v1.0 547519647118.dkr.ecr.sa-east-1.amazonaws.com/site-prod:1.0
          docker push 547519647118.dkr.ecr.sa-east-1.amazonaws.com/site-prod
  
  job2:
    name: deploy ec2
    needs: job1
    env:
      INSTANCE_KEY: ${{secrets.INSTANCE_KEY}}
      PUBLIC_IP: ${{secrets.PUBLIC_IP}}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy EC2 SSH
        run: |
          echo "$INSTANCE_KEY" > key-site.pem
          chmod 400 key-site.pem
          ssh -i key-site.pem -o StrictHostKeyChecking=no ec2-user@$PUBLIC_IP << EOF
            aws ecr get-login-password --region sa-east-1 | docker login --username AWS --password-stdin 547519647118.dkr.ecr.sa-east-1.amazonaws.com
            docker pull 547519647118.dkr.ecr.sa-east-1.amazonaws.com/site-prod:1.0
            echo "Removendo container"
            docker stop site-prod || true
            docker rm site-prod || true
            docker run -d -p 80:80 --name site 547519647118.dkr.ecr.sa-east-1.amazonaws.com/site-prod:1.0
            docker ps
          EOF
          rm key-site.pem